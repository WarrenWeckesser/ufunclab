name: tests

on: [push, pull_request]

jobs:
  ubuntu-latest:
    strategy:
      matrix:
        python-version: ['3.14', '3.13', '3.12', '3.11', '3.10']
        numpy-version: ['2.1.3', '2.2.6', '2.3.5', '2.4.4']
        exclude:
        - python-version: '3.10'
          numpy-version: '2.4.4'
        - python-version: '3.10'
          numpy-version: '2.3.5'
        - python-version: '3.14'
          numpy-version: '2.2.6'
        - python-version: '3.14'
          numpy-version: '2.1.3'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install --upgrade setuptools
        python -m pip install ninja meson-python toml pytest
        python -m pip install numpy==${{ matrix.numpy-version }}
    - name: Install ufunclab
      run: |
        python -m pip install --no-build-isolation .
    - name: Test with pytest
      run: |
        pytest --pyargs ufunclab

  macos:
    strategy:
      matrix:
        python-version: ['3.14', '3.13', '3.12', '3.11']
        numpy-version: ['2.1.3', '2.2.6', '2.3.5', '2.4.4']
        exclude:
        - python-version: '3.14'
          numpy-version: '2.2.6'
        - python-version: '3.14'
          numpy-version: '2.1.3'

    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6
    - name: Set up ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install --upgrade setuptools
        python -m pip install ninja meson-python toml pytest
        python -m pip install numpy==${{ matrix.numpy-version }}
    - name: Install ufunclab
      run: |
        python -m pip install --no-build-isolation .
    - name: Test with pytest
      run: |
        pytest --pyargs ufunclab

  windows-msvc:

    strategy:
      matrix:
        numpy-version: ['2.1.3', '2.2.6', '2.3.5', '2.4.4']
        os: ['windows-latest']
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up msvc-dev-cmd
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        architecture: 'x64'
        cache: 'pip'
        cache-dependency-path: 'environment.yml'

    - name: Install Python dependencies
      run: |
        pip install numpy==${{ matrix.numpy-version }} meson ninja meson-python pytest toml

    - name: Build
      run: |
        # Running meson and ninja before pip is only here for debugging
        # visibility.  Eventually those commands will be removed--all we
        # need is pip.
        meson setup build
        ninja -v -j 1 -C build
        pip -v install --no-build-isolation .

    - name: Test
      run: |
        pytest --pyargs ufunclab


name: Run on windows-2025-vs2026

on: workflow_dispatch

jobs:
  windows-msvc:

    strategy:
      matrix:
        numpy-version: ['2.4.4']
      fail-fast: false

    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        architecture: 'x64'
        cache: 'pip'
        cache-dependency-path: 'environment.yml'

    - name: Install Python dependencies
      run: |
        pip install numpy==${{ matrix.numpy-version }} meson ninja meson-python pytest toml

    #- name: Prepare MSVC
    #  # See https://dvdhrm.github.io/2021/04/21/meson-msvc-github-actions/
    #  uses: bus1/cabuild/action/msdevshell@v1
    #  with:
    #    architecture: x64

    - name: Build
      run: |
        # Running meson and ninja before pip is only here for debugging
        # visibility.  Eventually those commands will be removed--all we
        # need is pip.
        meson setup --vsenv build
        ninja -v -j 1 -C build
        pip -v install --no-build-isolation -Csetup-args="--vsenv" .

    - name: Test
      run: |
        pytest --pyargs ufunclab
